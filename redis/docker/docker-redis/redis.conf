# Redis 기본 설정

# 바인드 주소 (0.0.0.0: 모든 인터페이스 허용)
bind 0.0.0.0

# 포트
port 6379

# 패스워드 (필요 시 주석 해제)
# requirepass your_password

# 데이터 영속성 (AOF)
appendonly yes
appendfilename "appendonly.aof"

# 데이터 영속성 (RDB 스냅샷)
save 900 1
save 300 10
save 60 10000

# 최대 메모리 (필요 시 조정)
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# 로그 레벨 (debug, verbose, notice, warning)
loglevel notice
